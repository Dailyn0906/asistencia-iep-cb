spring.application.name=asistencia

# Base de datos (usa variables de entorno; valores por defecto solo para desarrollo local)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/asistencia_cb}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:admin123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Thymeleaf
spring.thymeleaf.cache=false

# Puerto
server.port=8080

# ===== Monitoreo (Spring Boot Actuator) =====
# Expone endpoints de salud, info y metricas del sistema para el plan de monitoreo
management.endpoints.web.exposure.include=health,info,metrics,loggers
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.info.env.enabled=true

# Informacion mostrada en /actuator/info
info.app.name=Sistema de Control de Asistencia - I.E.P. Cristina Beatriz
info.app.description=Sistema web de registro y monitoreo de asistencia estudiantil
info.app.version=1.0.0