<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Usuarios - I.E.P. Cristina Beatriz</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; display: flex; flex-direction: column; min-height: 100vh; }
        .navbar { background-color: #1a2b5e; padding: 12px 30px; display: flex; justify-content: space-between; align-items: center; }
        .navbar-brand div span { color: white; font-weight: bold; font-size: 15px; display: block; }
        .navbar-brand div small { color: white; font-size: 12px; opacity: 0.8; }
        .navbar-links a { color: white; text-decoration: none; font-size: 14px; margin-right: 20px; }
        .btn-logout { background: white; color: #1a2b5e; border: none; padding: 8px 18px; border-radius: 20px; font-size: 13px; cursor: pointer; font-weight: bold; }
        .content { flex: 1; padding: 30px 40px; }
        h1 { color: #1a2b5e; font-size: 22px; margin-bottom: 20px; }
        .card { background: white; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.08); padding: 25px; margin-bottom: 25px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 10px; font-size: 12px; color: #666; border-bottom: 2px solid #eee; }
        td { padding: 12px 10px; font-size: 14px; border-bottom: 1px solid #f0f0f0; }
        .badge { padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; }
        .badge-activo { background: #e8f5e9; color: #2e7d32; }
        .badge-inactivo { background: #fde8e8; color: #c0392b; }
        .rol-badge { padding: 4px 10px; border-radius: 12px; font-size: 11px; background: #e8eaf6; color: #3949ab; }
        .btn { border: none; padding: 6px 14px; border-radius: 15px; font-size: 12px; cursor: pointer; font-weight: bold; }
        .btn-activar { background: #2e7d32; color: white; }
        .btn-desactivar { background: #c0392b; color: white; }
        form.formulario { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; align-items: end; }
        .form-group label { display: block; font-size: 12px; color: #666; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px; }
        .btn-guardar { background: #c0392b; color: white; padding: 9px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; grid-column: span 1; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <div>
                <span>I.E.P. Cristina Beatriz</span>
                <small>Gestión de Usuarios</small>
            </div>
        </div>
        <div class="navbar-links">
            <a th:href="@{/dashboard}">Dashboard</a>
        </div>
        <form th:action="@{/logout}" method="post">
            <button class="btn-logout" type="submit">Cerrar sesión</button>
        </form>
    </nav>

    <div class="content">
        <h1>Gestión de Usuarios</h1>

        <div class="card">
            <h3 style="margin-bottom: 15px; color:#1a2b5e; font-size:15px;">Agregar nuevo usuario</h3>
            <form class="formulario" th:action="@{/usuarios/nuevo}" method="post">
                <div class="form-group">
                    <label>Nombre completo</label>
                    <input type="text" name="nombreCompleto" required>
                </div>
                <div class="form-group">
                    <label>Usuario</label>
                    <input type="text" name="username" required>
                </div>
                <div class="form-group">
                    <label>Contraseña temporal</label>
                    <input type="password" name="password" required>
                </div>
                <div class="form-group">
                    <label>Rol</label>
                    <select name="rol" required>
                        <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
                    </select>
                </div>
                <button class="btn-guardar" type="submit">Agregar usuario</button>
            </form>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Nombre completo</th>
                        <th>Usuario</th>
                        <th>Rol</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${usuarios}">
                        <td th:text="${u.nombreCompleto}">Nombre</td>
                        <td th:text="${u.username}">usuario</td>
                        <td><span class="rol-badge" th:text="${u.rol}">ROL</span></td>
                        <td>
                            <span th:if="${u.estado}" class="badge badge-activo">Activo</span>
                            <span th:unless="${u.estado}" class="badge badge-inactivo">Inactivo</span>
                        </td>
                        <td>
                            <form th:if="${u.estado}" th:action="@{/usuarios/{id}/desactivar(id=${u.idUsuario})}" method="post" style="display:inline">
                                <button class="btn btn-desactivar" type="submit">Desactivar</button>
                            </form>
                            <form th:unless="${u.estado}" th:action="@{/usuarios/{id}/activar(id=${u.idUsuario})}" method="post" style="display:inline">
                                <button class="btn btn-activar" type="submit">Activar</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
