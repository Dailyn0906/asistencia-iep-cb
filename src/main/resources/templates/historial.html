<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Historial de Asistencia - I.E.P. Cristina Beatriz</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; display: flex; flex-direction: column; min-height: 100vh; }
        .navbar { background-color: #1a2b5e; padding: 12px 30px; display: flex; justify-content: space-between; align-items: center; }
        .navbar-brand div span { color: white; font-weight: bold; font-size: 15px; display: block; }
        .navbar-brand div small { color: white; font-size: 12px; opacity: 0.8; }
        .navbar-links a { color: white; text-decoration: none; font-size: 14px; margin-right: 20px; }
        .btn-logout { background: white; color: #1a2b5e; border: none; padding: 8px 18px; border-radius: 20px; font-size: 13px; cursor: pointer; font-weight: bold; }
        .content { flex: 1; padding: 30px 40px; }
        h1 { color: #1a2b5e; font-size: 22px; margin-bottom: 20px; }
        .card { background: white; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.08); padding: 25px; }
        .buscador { display: flex; gap: 10px; margin-bottom: 20px; }
        .buscador input { flex: 1; padding: 10px 15px; border: 1px solid #ddd; border-radius: 25px; }
        .buscador button { padding: 10px 25px; background-color: #c0392b; color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 10px; font-size: 12px; color: #666; border-bottom: 2px solid #eee; }
        td { padding: 12px 10px; font-size: 14px; border-bottom: 1px solid #f0f0f0; }
        .btn-ver { padding: 6px 14px; background: #1a2b5e; color: white; border-radius: 15px; text-decoration: none; font-size: 12px; font-weight: bold; }
        .sin-resultados { color: #888; text-align: center; padding: 20px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <div>
                <span>I.E.P. Cristina Beatriz</span>
                <small>Historial de Asistencia</small>
            </div>
        </div>
        <div class="navbar-links">
            <a href="/dashboard">Dashboard</a>
        </div>
        <form th:action="@{/logout}" method="post">
            <button class="btn-logout" type="submit">Cerrar sesión</button>
        </form>
    </nav>

    <div class="content">
        <h1>Historial de Asistencia por Alumno</h1>

        <div class="card">
            <form class="buscador" th:action="@{/historial}" method="get">
                <input type="text" name="query" placeholder="Buscar por nombre o apellido..." th:value="${query}"/>
                <button type="submit">Buscar</button>
            </form>

            <table th:if="${resultados != null and !#lists.isEmpty(resultados)}">
                <thead>
                    <tr>
                        <th>Nombre completo</th>
                        <th>DNI</th>
                        <th>Grado / Sección</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="a : ${resultados}">
                        <td th:text="${a.nombreCompleto}">Nombre</td>
                        <td th:text="${a.dni}">DNI</td>
                        <td th:text="${a.grado} + ' ' + ${a.seccion}">Grado</td>
                        <td><a class="btn-ver" th:href="@{/historial/{id}(id=${a.idAlumno})}">Ver historial</a></td>
                    </tr>
                </tbody>
            </table>

            <p class="sin-resultados" th:if="${query != null and (resultados == null or #lists.isEmpty(resultados))}">
                No se encontraron alumnos con ese nombre.
            </p>
            <p class="sin-resultados" th:if="${query == null}">
                Escribe un nombre o apellido para buscar el historial de asistencia de un alumno.
            </p>
        </div>
    </div>
</body>
</html>
